apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hubforge-redis
  namespace: hubforge
spec:
  serviceName: hubforge-redis
  replicas: 1
  selector:
    matchLabels:
      app: hubforge-redis
  template:
    metadata:
      labels:
        app: hubforge-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: hubforge-redis
  namespace: hubforge
spec:
  selector:
    app: hubforge-redis
  ports:
    - port: 6379
      targetPort: 6379
