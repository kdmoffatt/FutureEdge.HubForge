apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hubforge-postgres
  namespace: hubforge
spec:
  serviceName: hubforge-postgres
  replicas: 1
  selector:
    matchLabels:
      app: hubforge-postgres
  template:
    metadata:
      labels:
        app: hubforge-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: hubforge
            - name: POSTGRES_USER
              value: hubforge
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hubforge-secrets
                  key: postgres-password
---
apiVersion: v1
kind: Service
metadata:
  name: hubforge-postgres
  namespace: hubforge
spec:
  selector:
    app: hubforge-postgres
  ports:
    - port: 5432
      targetPort: 5432
