name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run e2e placeholder
        run: echo "Add playwright/cypress suite here"
